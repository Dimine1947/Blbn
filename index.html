<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilihub | عالم الألعاب والشروحات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #16181b;
            --bg-card: #1f2226;
            --border-color: #2b2f35;
            --accent-blue: #00a8ff;
            --text-light: #f1f2f6;
            --text-muted: #9ea4ad;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* ==================== القائمة العلوية الذكية والمحسنة ==================== */
        nav {
            background-color: var(--bg-card);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }
        .logo span { color: var(--accent-blue); }
        .ps5-badge {
            background-color: #ffffff;
            color: #003087;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 1px 5px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
            margin: 0;
            padding: 0;
            overflow-x: auto; /* يسمح بالتمرير الأفقي على الهواتف دون تخريب الهيدر */
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .nav-links::-webkit-scrollbar { display: none; } /* إخفاء شريط التمرير المزعج */
        
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
            padding: 5px 2px;
        }
        .nav-links a.active, .nav-links a:hover { 
            color: #ffffff; 
            border-bottom: 2px solid var(--accent-blue);
        }

        .page { display: none; }
        .page.active-page { display: block; }

        /* ==================== 1. الصفحة الترحيبية ==================== */
        .welcome-screen {
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .welcome-logo {
            font-size: 3.5rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .welcome-logo i { color: var(--accent-blue); font-size: 3rem; }
        .quick-links-title {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 30px;
            margin-bottom: 20px;
        }
        .quick-links {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        .ql-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: center;
        }
        .ql-item i {
            font-size: 1.5rem;
            color: var(--accent-blue);
            background: rgba(0, 168, 255, 0.08);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s, transform 0.2s;
        }
        .ql-item:hover i { background: rgba(0, 168, 255, 0.2); transform: translateY(-3px); }

        /* ==================== 2. صفحة معرض الألعاب المتجاوبة ==================== */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
            box-sizing: border-box;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }
        .section-title {
            font-size: 1.5rem;
            margin: 0;
            border-right: 4px solid var(--accent-blue);
            padding-right: 10px;
        }
        .search-box {
            position: relative;
            flex-grow: 0;
        }
        .search-box input {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 30px 8px 12px;
            border-radius: 20px;
            outline: none;
            width: 140px;
            font-size: 0.85rem;
            transition: width 0.3s;
        }
        .search-box input:focus { width: 180px; border-color: var(--accent-blue); }
        .search-box i {
            position: absolute;
            right: 10px;
            top: 11px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* تعديل شبكة العرض لتصبح عمودين ممتازين على الهاتف وثلاثة أو أربعة على الكمبيوتر */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        @media (min-width: 600px) { .games-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px) { .games-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1100px) { .games-grid { grid-template-columns: repeat(5, 1fr); } }

        .game-card {
            background-color: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .game-card:hover {
            transform: scale(1.02);
            border-color: var(--accent-blue);
        }
        .game-thumb {
            width: 100%;
            aspect-ratio: 3 / 4; /* يحافظ على أبعاد البوستر الاحترافية للألعاب مثل الصورة تماماً */
            background-color: #25292e;
            background-size: cover;
            background-position: center;
        }
        .game-info { padding: 10px; }
        .game-title { font-size: 0.95rem; margin: 0 0 4px 0; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-meta { color: var(--text-muted); font-size: 0.75rem; }

        /* ==================== 3. صفحة تفاصيل اللعبة المحدثة ==================== */
        .game-details-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        @media (min-width: 768px) {
            .game-details-wrapper { flex-direction: row; padding: 30px; gap: 35px; }
        }
        .details-poster {
            width: 100%;
            max-width: 260px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }
        .details-info { flex-grow: 1; }
        .details-title { font-size: 1.8rem; margin: 10px 0 5px 0; }
        .rating-stars { color: #f1c40f; font-size: 0.9rem; margin-bottom: 15px; }
        .rating-stars span { color: var(--text-muted); margin-right: 5px; font-size: 0.8rem; }
        .details-desc { color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; font-size: 0.95rem; text-align: justify; }
        
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }
        .spec-table th, .spec-table td {
            padding: 8px 10px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }
        .spec-table th { color: var(--accent-blue); font-weight: 600; width: 40%; }

        .download-box {
            background: rgba(0, 168, 255, 0.04);
            border: 1px dashed var(--accent-blue);
            padding: 15px;
            border-radius: 8px;
        }
        .btn-main-download {
            display: inline-block;
            background-color: var(--accent-blue);
            color: #fff;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.95rem;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.2s;
        }
        @media (min-width: 480px) { .btn-main-download { width: auto; } }
        .btn-main-download:hover { background-color: #0097e6; }
        
        .reviews-section { margin-top: 30px; }
        .review-card {
            background-color: var(--bg-dark);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }
        .review-header { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
        .review-avatar { width: 35px; height: 35px; background: #2b2f35; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
        .user-name { font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="page-welcome" class="page active-page">
        <nav>
            <div class="logo-container">
                <div class="logo"><span>b</span>Bilihub</div>
                <div class="ps5-badge">PS5</div>
            </div>
        </nav>
        <div class="welcome-screen">
            <div class="welcome-logo">
                <i class="fa-solid fa-cube"></i>Bilihub
            </div>
            <div class="quick-links-title">Quick Links</div>
            <div class="quick-links">
                <div class="ql-item">
                    <i class="fa-regular fa-comments"></i>
                    <span>Forums</span>
                </div>
                <div class="ql-item" onclick="navigateTo('page-gallery')">
                    <i class="fa-solid fa-gamepad"></i>
                    <span>Games</span>
                </div>
                <div class="ql-item">
                    <i class="fa-regular fa-newspaper"></i>
                    <span>News</span>
                </div>
                <div class="ql-item">
                    <i class="fa-regular fa-star"></i>
                    <span>Reviews</span>
                </div>
            </div>
        </div>
    </div>


    <div id="page-gallery" class="page">
        <nav>
            <div class="logo-container" onclick="navigateTo('page-welcome')">
                <div class="logo"><span>b</span>Bilihub</div>
                <div class="ps5-badge">PS5</div>
            </div>
            <ul class="nav-links">
                <li><a href="#" onclick="navigateTo('page-gallery')" class="active">Games</a></li>
                <li><a href="#">Forums</a></li>
                <li><a href="#">News</a></li>
                <li><a href="#">Reviews</a></li>
            </ul>
        </nav>

        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Games</h2>
                <div class="search-box">
                    <input type="text" placeholder="بحث...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>

            <div class="games-grid" id="games-container">
                </div>
        </div>
    </div>


    <div id="page-details" class="page">
        <nav>
            <div class="logo-container" onclick="navigateTo('page-gallery')">
                <div class="logo"><span>b</span>Bilihub</div>
                <div class="ps5-badge">PS5</div>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active">Download</a></li>
                <li><a href="#" onclick="navigateTo('page-gallery')">Back</a></li>
            </ul>
        </nav>

        <div class="container" id="details-container">
            </div>
    </div>

    <script>
        // داتا الألعاب متضمنة صور بوسترات رأسية عالية الدقة والوضوح ومجانية بالكامل ومثالية لموقعك
        const gamesData = [
            {
                id: "warzone",
                title: "Call of Duty: Warzone",
                category: "شوتر / باتل رويال",
                img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500&auto=format&fit=crop",
                desc: "تجربة الباتل رويال الأقوى والمجانية بالكامل من سلسلة Call of Duty. انزل مع أصدقائك، اجمع العتاد واشتبك في معارك طاحنة وشرسة للبقاء على قيد الحياة حتى النهاية.",
                cpu: "Intel Core i5-2500K / AMD R5 1600X",
                gpu: "NVIDIA GTX 970 / GTX 1660",
                ram: "12 GB RAM",
                size: "65 GB"
            },
            {
                id: "bloodstrike",
                title: "Blood Strike",
                category: "FPS / ألعاب سريعة",
                img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=500&auto=format&fit=crop",
                desc: "لعبة شوتر سريعة الحركة مصممة بذكاء لتعمل بأعلى أداء وسلاسة مذهلة على كافة الأجهزة الضعيفة والمتوسطة مع الحفاظ على رسوميات تكتيكية قوية وممتعة.",
                cpu: "Intel Core i3 أو ما يعادله",
                gpu: "NVIDIA GTX 750 Ti",
                ram: "6 GB",
                size: "4 GB"
            },
            {
                id: "gta5",
                title: "Grand Theft Auto V",
                category: "عالم مفتوح / أكشن",
                img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=500&auto=format&fit=crop",
                desc: "لعبة العالم المفتوح الأكثر مبيعاً بالتاريخ. قم بالتجول في لوس سانتوس، نفذ السرقات الكبرى، واستمتع بطور اللعب الجماعي ومودات الحياة الواقعية اللانهائية.",
                cpu: "Intel Core i5 3470",
                gpu: "NVIDIA GTX 660 2GB",
                ram: "8 GB",
                size: "110 GB"
            },
            {
                id: "minecraft",
                title: "Minecraft PC",
                category: "بناء / نجاة / مغامرة",
                img: "https://images.unsplash.com/photo-1605899435973-ca2d1a8861cf?q=80&w=500&auto=format&fit=crop",
                desc: "عالم لا حصر له من الإبداع، ابنِ قلاعك الخاصة، واجه الكائنات الليلية الخطيرة في طور النجاة، أو نافس رفاقك في السيرفرات الجماعية ومودات الحرب.",
                cpu: "Intel Core i3-3210",
                gpu: "Intel HD Graphics 4000",
                ram: "4 GB",
                size: "2 GB"
            }
        ];

        // بناء المعرض
        const grid = document.getElementById('games-container');
        gamesData.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openGameDetails(game.id);
            card.innerHTML = `
                <div class="game-thumb" style="background-image: url('${game.img}')"></div>
                <div class="game-info">
                    <h3 class="game-title">${game.title}</h3>
                    <div class="game-meta">${game.category}</div>
                </div>
            `;
            grid.appendChild(card);
        });

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            window.scrollTo(0, 0);
        }

        function openGameDetails(gameId) {
            const game = gamesData.find(g => g.id === gameId);
            const detailsContainer = document.getElementById('details-container');
            
            detailsContainer.innerHTML = `
                <div class="game-details-wrapper">
                    <div class="details-poster" style="background-image: url('${game.img}')"></div>
                    <div class="details-info">
                        <h1 class="details-title">${game.title}</h1>
                        <div class="rating-stars">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star-half-stroke"></i>
                            <span>(4.8 تقييم من زوار الموقع)</span>
                        </div>
                        <p class="details-desc">${game.desc}</p>
                        
                        <h3 style="color:#fff; font-size:1.1rem; margin-bottom:10px;"><i class="fa-solid fa-microchip" style="color:var(--accent-blue)"></i> متطلبات تشغيل اللعبة:</h3>
                        <table class="spec-table">
                            <tr><th>المعالج</th><td>${game.cpu}</td></tr>
                            <tr><th>كرت الشاشة</th><td>${game.gpu}</td></tr>
                            <tr><th>الرام</th><td>${game.ram}</td></tr>
                            <tr><th>المساحة</th><td>${game.size}</td></tr>
                        </table>

                        <div class="download-box">
                            <h4 style="margin:0 0 5px 0; color:#fff;"><i class="fa-solid fa-circle-info" style="color:var(--accent-blue)"></i> تنبيه تخطي الروابط الإعلانية:</h4>
                            <p style="margin:0 0 12px 0; font-size:0.8rem; color:var(--text-muted)">إذا واجهتك نوافذ منبثقة مزعجة، لا تقلق! انتظر التنازلي وتخطى الإعلانات فوراً للوصول لملف اللعبة المباشر.</p>
                            <a href="#" class="btn-main-download" onclick="alert('سيتم توجيهك الآن لروابط تحميل ملفات اللعبة بأمان عبر Bilihub!')"><i class="fa-solid fa-download"></i> تحميل اللعبة برابط مباشر</a>
                        </div>
                    </div>
                </div>

                <div class="reviews-section">
                    <h3 class="section-title">مراجعات اللاعبين</h3>
                    <div class="review-card">
                        <div class="review-header">
                            <div class="review-avatar"><i class="fa-solid fa-user"></i></div>
                            <div>
                                <div class="user-name">زائر محترف</div>
                                <div style="color:#f1c40f; font-size:0.7rem;"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i></div>
                            </div>
                        </div>
                        <p style="margin:0; color:var(--text-muted); font-size:0.85rem;">الموقع والروابط تعمل بنجاح مذهل على هاتفي وحاسوبي، التنسيق الرمادي مريح جداً للعين أثناء الليل!</p>
                    </div>
                </div>
            `;
            
            navigateTo('page-details');
        }
    </script>
</body>
</html>
