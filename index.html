<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DADI QUEEN - موقع المانغا الخاص بي</title>
    <style>
        /* شاشة التحميل الوردية */
        #loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ff75a0; /* لون وردي لطيف */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        /* تنسيق الـ GIF المخصص وحجمه */
        .loading-cat-img {
            width: 180px; /* حجم مناسب ومميز للـ GIF */
            height: auto;
            animation: none; /* تم إيقاف الدوران ليظهر الـ GIF بحركته الطبيعية */
            margin-bottom: 20px;
            border-radius: 12px; /* زوايا منحنية ناعمة للصورة */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); /* ظل خفيف خلف الـ GIF */
        }

        /* نص التحميل أسفل الـ GIF */
        .loading-text {
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* كود الموقع الأصلي */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e222b;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .site-title {
            text-align: center;
            font-size: 42px;
            font-weight: 800;
            color: #e84393;
            margin-top: 15px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(232, 67, 147, 0.6), 0 0 20px rgba(232, 67, 147, 0.4);
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .brand-dadi {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .crown-icon {
            font-size: 38px;
            display: inline-block;
            margin-bottom: -5px;
        }

        .search-container {
            width: 100%;
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            background-color: #fff;
            color: #333;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            outline: none;
            box-sizing: border-box;
        }

        .manga-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .manga-card {
            background-color: #282e3a;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #384152;
            transition: all 0.3s ease;
        }

        .manga-card:hover {
            border-color: #e84393;
            box-shadow: 0 0 12px rgba(232, 67, 147, 0.3);
            transform: translateY(-2px);
        }

        .manga-card img {
            width: 80px;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #384152;
        }

        .manga-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .manga-title {
            font-size: 18px;
            margin: 0;
            font-weight: bold;
        }

        .manga-chapter {
            font-size: 14px;
            color: #a4b0be;
            margin: 0;
        }

        .manga-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .tag {
            background-color: #1e222b;
            color: #a4b0be;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 5px;
        }

        .read-btn {
            background: none;
            border: 1px solid #e84393;
            color: #e84393;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .manga-card:hover .read-btn {
            background-color: #e84393;
            color: #1e222b;
        }
    </style>
</head>
<body>

    <!-- الشاشة الوردية المؤقتة مع الـ GIF الخاص بك -->
    <div id="loader-screen">
        <img src="https://cdn2.hentaigifz.com/58024/cat-with-big-tits.gif" alt="Cat Loading" class="loading-cat-img">
        <div class="loading-text">جاري فتح DADI QUEEN...</div>
    </div>

    <div class="container">

        <!-- اسم الموقع مع التاج الملكي فوقه -->
        <h1 class="site-title">
            <span class="crown-icon">👑</span><br>
            <span class="brand-dadi">DADI</span> QUEEN
        </h1>

        <!-- شريط البحث العلوي -->
        <div class="search-container">
            <input type="text" class="search-box" placeholder="ابحث عن مانغا...">
        </div>

        <!-- قائمة المانغا -->
        <div class="manga-list">

            <!-- المانغا 1 -->
            <a href="dadi1.html" class="manga-card">
                <img src="https://via.placeholder.com/150x200?text=Manga+Cover" alt="Manga Cover">
                <div class="manga-details">
                    <h2 class="manga-title">اسم المانغا 1</h2>
                    <p class="manga-chapter">رقم الفصل: #1</p>
                    <div class="manga-tags">
                        <span class="tag">Action</span>
                        <span class="tag">Adventure</span>
                    </div>
                </div>
                <button class="read-btn">Read Now</button>
            </a>

            <!-- المانغا 2 -->
            <a href="#" class="manga-card">
                <img src="https://via.placeholder.com/150x200?text=Manga+Cover" alt="Manga Cover">
                <div class="manga-details">
                    <h2 class="manga-title">اسم المانغا 2</h2>
                    <p class="manga-chapter">رقم الفصل: #1</p>
                    <div class="manga-tags">
                        <span class="tag">Action</span>
                    </div>
                </div>
                <button class="read-btn">Read Now</button>
            </a>

        </div>
    </div>

    <!-- كود الـ JavaScript لحساب الـ 3 ثواني وإخفاء الشاشة -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-screen');
                loader.style.opacity = '0'; // إخفاء ناعم تدريجي
                setTimeout(() => {
                    loader.style.display = 'none'; // إزالة العنصر تماماً من الواجهة
                }, 500);
            }, 3000); // مدة الانتظار 3 ثوانٍ قبل الاختفاء
        });
    </script>

</body>
</html>
