<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilihub | عالم الألعاب والشروحات</title>
    <!-- استدعاء خط أنيق وأيقونات FontAwesome لتشبه التصميم تماماً -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #1a1d20;
            --bg-card: #212529;
            --border-color: #2d3238;
            --accent-blue: #00a8ff;
            --text-light: #f1f2f6;
            --text-muted: #a0a5ad;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* القائمة العلوية المشتركة (تظهر في صفحة 2 و 3) */
        nav {
            background-color: var(--bg-card);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }
        .logo span { color: var(--accent-blue); }
        .ps5-badge {
            background-color: #ffffff;
            color: #003087;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.05rem;
            transition: color 0.2s;
        }
        .nav-links a.active, .nav-links a:hover { color: #ffffff; }

        /* التحكم في ظهور واختفاء الصفحات */
        .page { display: none; }
        .page.active-page { display: block; }

        /* ==================== 1. تنسيق الصفحة الترحيبية ==================== */
        .welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #16181b;
        }
        .welcome-logo {
            font-size: 4.5rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .welcome-logo i { color: var(--accent-blue); font-size: 4rem; }
        .quick-links-title {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 40px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .quick-links {
            display: flex;
            gap: 40px;
        }
        .ql-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
            font-size: 1.1rem;
        }
        .ql-item i {
            font-size: 2rem;
            color: var(--accent-blue);
            background: rgba(0, 168, 255, 0.1);
            padding: 20px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .ql-item:hover { color: #fff; transform: translateY(-5px); }
        .ql-item:hover i { background: rgba(0, 168, 255, 0.2); }

        /* ==================== 2. تنسيق معرض الألعاب ==================== */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 1.8rem;
            margin: 0;
            border-right: 4px solid var(--accent-blue);
            padding-right: 12px;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 35px 10px 15px;
            border-radius: 20px;
            outline: none;
            width: 200px;
        }
        .search-box i {
            position: absolute;
            right: 12px;
            top: 12px;
            color: var(--text-muted);
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }
        .game-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.3s, border-color 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-blue);
        }
        .game-thumb {
            width: 100%;
            height: 290px;
            background-color: #2d3238;
            background-size: cover;
            background-position: center;
        }
        .game-info { padding: 15px; }
        .game-title { font-size: 1.15rem; margin: 0 0 5px 0; color: #fff; }
        .game-meta { color: var(--text-muted); font-size: 0.85rem; }

        /* ==================== 3. تنسيق صفحة تفاصيل اللعبة ==================== */
        .game-details-wrapper {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            background-color: var(--bg-card);
            padding: 35px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        .details-poster {
            width: 320px;
            height: 420px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        .details-info { flex-grow: 1; }
        .details-title { font-size: 2.5rem; margin: 0 0 10px 0; }
        .rating-stars { color: #f1c40f; font-size: 1.1rem; margin-bottom: 20px; }
        .rating-stars span { color: var(--text-muted); margin-right: 8px; font-size: 0.9rem; }
        .details-desc { color: var(--text-muted); line-height: 1.7; margin-bottom: 30px; font-size: 1.05rem; }
        
        .spec-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        .spec-table th, .spec-table td {
            padding: 10px 15px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }
        .spec-table th { color: var(--accent-blue); background-color: rgba(250,250,250,0.02); }

        .download-box {
            background: rgba(0, 168, 255, 0.05);
            border: 1px dashed var(--accent-blue);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .btn-download-container { display: flex; gap: 15px; align-items: center; }
        .btn-main-download {
            background-color: var(--accent-blue);
            color: #fff;
            padding: 12px 35px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background 0.2s;
        }
        .btn-main-download:hover { background-color: #0097e6; }
        
        /* التقييمات التشبيهية من الصورة */
        .reviews-section { margin-top: 40px; }
        .review-card {
            background-color: #1a1d20;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
        .review-header { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
        .review-avatar { width: 40px; height: 40px; background: #3d444e; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-name { font-weight: bold; font-size: 0.95rem; }
    </style>
</head>
<body>

    <!-- ==================== 1. الصفحة الترحيبية (أول دخول للموقع) ==================== -->
    <div id="page-welcome" class="page active-page class-welcome-screen">
        <div class="welcome-screen">
            <div class="welcome-logo">
                <i class="fa-shapes"></i> Bilihub
            </div>
            <div class="quick-links-title">Quick Links</div>
            <div class="quick-links">
                <div class="ql-item">
                    <i class="fa-regular fa-comments"></i>
                    <span>Forums</span>
                </div>
                <!-- تم تغيير كلمة Shop إلى Games بناءً على طلبك -->
                <div class="ql-item" onclick="navigateTo('page-gallery')">
                    <i class="fa-solid fa-gamepad"></i>
                    <span>Games</span>
                </div>
                <div class="ql-item">
                    <i class="fa-regular fa-newspaper"></i>
                    <span>News</span>
                </div>
                <div class="ql-item">
                    <i class="fa-regular fa-star"></i>
                    <span>Reviews</span>
                </div>
            </div>
        </div>
    </div>


    <!-- ==================== 2. صفحة معرض الألعاب ==================== -->
    <div id="page-gallery" class="page">
        <nav>
            <div class="logo-container" onclick="navigateTo('page-welcome')">
                <div class="logo"><span>b</span>Bilihub</div>
                <div class="ps5-badge">PS5</div>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active">Games</a></li>
                <li><a href="#">Forums</a></li>
                <li><a href="#">News</a></li>
                <li><a href="#">Reviews</a></li>
            </ul>
        </nav>

        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Games</h2>
                <div class="search-box">
                    <input type="text" placeholder="بحث عن لعبة...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>

            <!-- شبكة الألعاب - اضغط على أي لعبة لفتح الصفحة الثالثة -->
            <div class="games-grid" id="games-container">
                <!-- الألعاب سيتم توليدها تلقائياً عبر الجافاسكربت بالأسفل -->
            </div>
        </div>
    </div>


    <!-- ==================== 3. صفحة تفاصيل اللعبة والتحميل ==================== -->
    <div id="page-details" class="page">
        <nav>
            <div class="logo-container" onclick="navigateTo('page-gallery')">
                <div class="logo"><span>b</span>Bilihub</div>
                <div class="ps5-badge">PS5</div>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active">Download</a></li>
                <li><a href="#" onclick="navigateTo('page-gallery')">Back to Games</a></li>
            </ul>
        </nav>

        <div class="container" id="details-container">
            <!-- سيتم تعبئة تفاصيل اللعبة المحددة هنا dynamically -->
        </div>
    </div>

    <!-- جافا سكريبت الذكية للربط بين الصفحات والعرض التلقائي للمعلومات -->
    <script>
        // داتا الألعاب المرفوعة على موقعك وصور بوسترات مميزة لكل لعبة جاهزة ومجانية
        const gamesData = [
            {
                id: "warzone",
                title: "Call of Duty: Warzone",
                category: "شوتر / باتل رويال",
                img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=400&auto=format&fit=crop",
                desc: "تجربة الباتل رويال الضخمة والمجانية بالكامل من سلسلة Call of Duty الشهيرة، انزل مع فريقك واصمد حتى النهاية في مواجهات حماسية بمعدل إطارات مرتفع وسلس.",
                cpu: "Intel Core i5-2500K / AMD Ryzen R5 1600X",
                gpu: "NVIDIA GTX 970 / GTX 1660 Super",
                ram: "12 GB RAM",
                size: "65 GB"
            },
            {
                id: "bloodstrike",
                title: "Blood Strike",
                category: "FPS / ألعاب سريعة",
                img: "https://images.unsplash.com/photo-1553481187-be93c21490a9?q=80&w=400&auto=format&fit=crop",
                desc: "لعبة باتل رويال سريعة الوتيرة ومخصصة للعمل بأعلى كفاءة وسلاسة على الأجهزة المتوسطة والقوية، استمتع بالحركة السريعة والباركور أثناء القتال الحاد.",
                cpu: "Intel Core i3 أو ما يعادله",
                gpu: "NVIDIA GTX 750 Ti",
                ram: "6 GB RAM",
                size: "4 GB"
            },
            {
                id: "gta5",
                title: "Grand Theft Auto V",
                category: "عالم مفتوح / أكشن",
                img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=400&auto=format&fit=crop",
                desc: "عش مغامرة العالم المفتوح الأسطورية في مدينة لوس سانتوس، نفذ السرقات الكبرى واستمتع بأقوى مودات الحياة الواقعية واللعب الجماعي الممتع.",
                cpu: "Intel Core i5 3470 / AMD FX 8350",
                gpu: "NVIDIA GTX 660 2GB",
                ram: "8 GB RAM",
                size: "110 GB"
            },
            {
                id: "minecraft",
                title: "Minecraft",
                category: "بناء / نجاة / عالم مفتوح",
                img: "https://images.unsplash.com/photo-1605899435973-ca2d1a8861cf?q=80&w=400&auto=format&fit=crop",
                desc: "ابنِ عالمك الخاص، استكشف الكهوف، واجه الوحوش في الليل أو العب في أطوار الأونلاين والـ Bedwars مع أصدقائك بوضعيات ومودات لا حصر لها.",
                cpu: "Intel Core i3-3210 / AMD A8-7600",
                gpu: "Intel HD Graphics 4000 / AMD Radeon R5",
                ram: "4 GB RAM",
                size: "2 GB"
            }
        ];

        // تنصيب وعرض الألعاب في الصفحة الثانية
        const grid = document.getElementById('games-container');
        gamesData.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openGameDetails(game.id);
            card.innerHTML = `
                <div class="game-thumb" style="background-image: url('${game.img}')"></div>
                <div class="game-info">
                    <h3 class="game-title">${game.title}</h3>
                    <div class="game-meta">${game.category}</div>
                </div>
            `;
            grid.appendChild(card);
        });

        // دالة التنقل الفوري بين الصفحات بالأنيميشن المريح للعين
        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            window.scrollTo(0, 0);
        }

        // دالة فتح وعرض اللعبة المختارة بالصفحة الثالثة بالتفاصيل والتقييمات
        function openGameDetails(gameId) {
            const game = gamesData.find(g => g.id === gameId);
            const detailsContainer = document.getElementById('details-container');
            
            detailsContainer.innerHTML = `
                <div class="game-details-wrapper">
                    <div class="details-poster" style="background-image: url('${game.img}')"></div>
                    <div class="details-info">
                        <h1 class="details-title">${game.title}</h1>
                        <div class="rating-stars">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star-half-stroke"></i>
                            <span>(4.8 تقييم من زوار Bilihub)</span>
                        </div>
                        <p class="details-desc">${game.desc}</p>
                        
                        <h3 style="color:#fff; margin-bottom:15px;"><i class="fa-solid fa-microchip" style="color:var(--accent-blue)"></i> متطلبات التشغيل الموصى بها:</h3>
                        <table class="spec-table">
                            <tr><th>المعالج (CPU)</th><td>${game.cpu}</td></tr>
                            <tr><th>كرت الشاشة (GPU)</th><td>${game.gpu}</td></tr>
                            <tr><th>الذاكرة العشوائية</th><td>${game.ram}</td></tr>
                            <tr><th>المساحة المطلوبة</th><td>${game.size}</td></tr>
                        </table>

                        <div class="download-box">
                            <h4 style="margin:0 0 10px 0; color:#fff;"><i class="fa-solid fa-circle-info" style="color:var(--accent-blue)"></i> تنبيه تخطي الروابط:</h4>
                            <p style="margin:0 0 15px 0; font-size:0.9rem; color:var(--text-muted)">إذا واجهت أي إعلانات منبثقة، يرجى مراجعة صفحة "شروحات التخطي" لتصل إلى الرابط المباشر في أقل من 10 ثوانٍ!</p>
                            <div class="btn-download-container">
                                <a href="#" class="btn-main-download" onclick="alert('سيتم تحويلك لصفحة تحميل ملفات اللعبة المؤمنة عبر Bilihub')"><i class="fa-solid fa-download"></i> تحميل اللعبة الآن</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="reviews-section">
                    <h3 class="section-title">مراجعات وتعليقات اللاعبين (User Reviews)</h3>
                    <div class="review-card">
                        <div class="review-header">
                            <div class="review-avatar"><i class="fa-solid fa-user-ninja"></i></div>
                            <div>
                                <div class="user-name">ميدو جيمر</div>
                                <div style="color:#f1c40f; font-size:0.8rem;"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i></div>
                            </div>
                        </div>
                        <p style="margin:0; color:var(--text-muted); font-size:0.95rem;">الروابط سريعة جداً والشرح المرفق ساعدني لتخطي الإعلانات بسهولة تامة، الموقع خفيف جداً وممتاز على الـ 240Hz!</p>
                    </div>
                </div>
            `;
            
            navigateTo('page-details');
        }
    </script>
</body>
</html>
