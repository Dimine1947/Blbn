<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر bili shop للألبسة</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            color: #333;
        }

        /* الهيدر وشريط التنقل */
        header {
            background-color: #ffffff;
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #e91e63; /* لون أنثوي وعصري */
        }

        nav a {
            text-decoration: none;
            color: #555;
            margin: 0 15px;
            font-weight: 600;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #e91e63;
        }

        .cart-icon {
            font-size: 20px;
            cursor: pointer;
            position: relative;
        }

        /* واجهة العرض الرئيسية (Hero Section) */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn-shop {
            background-color: #e91e63;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s;
        }

        .btn-shop:hover {
            background-color: #c2185b;
        }

        /* قسم المنتجات */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: #e91e63;
            margin: 10px auto 0;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }

        .product-price {
            color: #e91e63;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .btn-add-cart {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .btn-add-cart:hover {
            background-color: #e91e63;
        }

        /* الفوتر (أسفل الصفحة) */
        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header>
        <div class="logo">FEM QUEEN</div>
        <nav>
            <a href="#">الرئيسية</a>
            <a href="#">فساتين</a>
            <a href="#">ملابس كاجوال</a>
            <a href="#">تخفيضات</a>
        </nav>
        <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
    </header>

    <!-- واجهة ترحيبية -->
    <section class="hero">
        <h1>أحدث صيحات الموضة والأناقة</h1>
        <p>اكتشفي تشكيلتنا الجديدة والمميزة لعام 2026</p>
        <a href="#products" class="btn-shop">تسوقي الآن</a>
    </section>

    <!-- المنتجات -->
    <div class="container" id="products">
        <h2 class="section-title">المنتجات المميزة</h2>
        
        <div class="products-grid">
            <!-- منتج 1 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?auto=format&fit=crop&w=500&q=80" alt="فستان أنيق" class="product-image">
                <div class="product-info">
                    <h3 class="product-title">فستان سهرة أنيق</h3>
                    <div class="product-price">4,500 د.ج</div>
                    <button class="btn-add-cart" onclick="addToCart()">إضافة للسلة</button>
                </div>
            </div>

            <!-- منتج 2 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&w=500&q=80" alt="ملابس كاجوال" class="product-image">
                <div class="product-info">
                    <h3 class="product-title">طقم كاجوال عصري</h3>
                    <div class="product-price">6,200 د.ج</div>
                    <button class="btn-add-cart" onclick="addToCart()">إضافة للسلة</button>
                </div>
            </div>

            <!-- منتج 3 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=500&q=80" alt="قميص نسائي" class="product-image">
                <div class="product-info">
                    <h3 class="product-title">قميص صيفي مريح</h3>
                    <div class="product-price">2,800 د.ج</div>
                    <button class="btn-add-cart" onclick="addToCart()">إضافة للسلة</button>
                </div>
            </div>
        </div>
    </div>

    <!-- الفوتر -->
    <footer>
        <p>&copy; 2026 جميع الحقوق محفوظة لمتجر FEM QUEEN</p>
    </footer>

    <!-- سكربت بسيط لتحديث السلة -->
    <script>
        let count = 0;
        function addToCart() {
            count++;
            document.getElementById('cart-count').innerText = count;
            alert('تم إضافة المنتج إلى سلة المشتريات!');
        }
    </script>

</body>
</html>
