<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bili Shop</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #000;
        color: white;
    }

    header {
        background: #111;
        padding: 20px;
        text-align: center;
        box-shadow: 0 2px 10px rgba(255,255,255,0.1);
    }

    header h1 {
        margin: 0;
        font-size: 40px;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        padding: 20px;
        max-width: 1400px;
        margin: auto;
    }

    .product {
        background: #1a1a1a;
        border-radius: 25px;
        overflow: hidden;
        text-align: center;
        transition: 0.3s;
    }

    .product:hover {
        transform: translateY(-5px);
    }

    .product img {
        width: 100%;
        height: 250px;
        object-fit: cover;
    }

    .product h3 {
        margin: 15px 0 5px;
    }

    .price {
        color: #00ff88;
        font-size: 20px;
        font-weight: bold;
    }

    .btn {
        display: inline-block;
        margin: 15px;
        padding: 12px 25px;
        background: white;
        color: black;
        text-decoration: none;
        border-radius: 12px;
        font-weight: bold;
    }

    .pagination {
        text-align: center;
        padding: 20px;
    }

    .pagination button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
    }

    .active {
        background: white;
        color: black;
    }
</style>
</head>

<body>

<header>
    <h1>Bili Shop</h1>
    <p>أفضل الألبسة بأفضل الأسعار</p>
</header>

<div class="products" id="products"></div>

<div class="pagination">
    <button onclick="changePage(1)" class="active" id="btn1">1</button>
    <button onclick="changePage(2)" id="btn2">2</button>
    <button onclick="changePage(3)" id="btn3">3</button>
    <button onclick="changePage(4)" id="btn4">4</button>
</div>

<script>
const products = [];

for (let i = 1; i <= 80; i++) {
    products.push({
        name: "منتج " + i,
        price: (2000 + i * 50) + " دج",
        image: "https://picsum.photos/300/300?random=" + i
    });
}

function changePage(page) {
    const container = document.getElementById("products");

    document.querySelectorAll(".pagination button")
        .forEach(btn => btn.classList.remove("active"));

    document.getElementById("btn" + page)
        .classList.add("active");

    container.innerHTML = "";

    const start = (page - 1) * 20;
    const end = start + 20;

    products.slice(start, end).forEach(product => {
        container.innerHTML += `
            <div class="product">
                <img src="${product.image}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p class="price">${product.price}</p>

                <a class="btn"
                   href="https://wa.me/213XXXXXXXXX?text=أريد طلب ${product.name}">
                   اطلب الآن
                </a>
            </div>
        `;
    });
}

changePage(1);
</script>

</body>
</html>
